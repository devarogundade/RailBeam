<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Card funded</title>
</head>
<body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #111;">
  <p>Hi {{displayName}},</p>
  <p>Your virtual card ending in {{lastFour}} was funded.</p>
  <ul>
    <li><strong>Added:</strong> ${{fundedUsd}}</li>
    <li><strong>New balance:</strong> ${{balanceUsd}}</li>
  </ul>
  <p><a href="{{appUrl}}">Open Beam</a></p>
</body>
</html>
