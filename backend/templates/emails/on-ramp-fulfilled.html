<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>On-ramp complete</title>
</head>
<body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #111;">
  <p>Hi {{displayName}},</p>
  <p>Your Beam on-ramp purchase is complete.</p>
  <ul>
    <li><strong>Amount:</strong> {{tokenAmount}} {{tokenSymbol}}</li>
    <li><strong>Paid:</strong> ${{usdAmount}} USD</li>

  </ul>
  <p><a href="{{appUrl}}">Open Beam</a></p>
</body>
</html>
