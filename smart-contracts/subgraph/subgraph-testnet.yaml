# Stardorm EIP-8004 subgraph (agents + reputation + validations).
# 1) Set `source.address` and `source.startBlock` for each data source (deployed contracts).
# 2) From repo root: `node scripts/copy-subgraph-abis.mjs` then `cd subgraph && npm i && npm run codegen && npm run build`
# 3) Goldsky: `goldsky login` then `goldsky subgraph deploy <project>/<version> --path .` (see https://docs.goldsky.com/subgraphs/deploying-subgraphs )

specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: IdentityRegistry
    network: 0g-galileo-testnet
    source:
      address: "0x356ded77c7f00a4681142f9b1128F181a882bcED"
      abi: IdentityRegistry
      startBlock: 33278700
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
        - AgentMetadata
        - UserSubscription
      abis:
        - name: IdentityRegistry
          file: ./abis/IdentityRegistry.json
      eventHandlers:
        - event: Registered(indexed uint256,string,indexed address)
          handler: handleAgentRegistered
        - event: URIUpdated(indexed uint256,string,indexed address)
          handler: handleAgentURIUpdated
        - event: MetadataSet(indexed uint256,indexed string,string,bytes)
          handler: handleAgentMetadataSet
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleAgentTransfer
        - event: Cloned(indexed address,indexed uint256,indexed uint256)
          handler: handleAgentCloned
        - event: Subscribed(indexed address,indexed uint256,uint256,uint256)
          handler: handleSubscribed
        - event: Unsubscribed(indexed address,indexed uint256,uint256,uint256)
          handler: handleUnsubscribed
        - event: FeesSet(indexed uint256,uint256)
          handler: handleFeesSet
      file: ./src/mapping.ts
  - kind: ethereum
    name: ReputationRegistry
    network: 0g-galileo-testnet
    source:
      address: "0xe08Db0Ea1145E150481ad4d631F4755C160c626F"
      abi: ReputationRegistry
      startBlock: 33278700
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Feedback
        - FeedbackResponse
      abis:
        - name: ReputationRegistry
          file: ./abis/ReputationRegistry.json
      eventHandlers:
        - event: NewFeedback(indexed uint256,indexed address,uint64,int128,uint8,indexed string,string,string,string,string,bytes32)
          handler: handleNewFeedback
        - event: FeedbackRevoked(indexed uint256,indexed address,indexed uint64)
          handler: handleFeedbackRevoked
        - event: ResponseAppended(indexed uint256,indexed address,uint64,indexed address,string,bytes32)
          handler: handleResponseAppended
      file: ./src/mapping.ts
  - kind: ethereum
    name: ValidationRegistry
    network: 0g-galileo-testnet
    source:
      address: "0x9517e7575ff1fA96d09b3224AA92677a7a460a2F"
      abi: ValidationRegistry
      startBlock: 33278700
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Validation
      abis:
        - name: ValidationRegistry
          file: ./abis/ValidationRegistry.json
      eventHandlers:
        - event: ValidationRequest(indexed address,indexed uint256,string,indexed bytes32)
          handler: handleValidationRequest
        - event: ValidationResponse(indexed address,indexed uint256,indexed bytes32,uint8,string,bytes32,string)
          handler: handleValidationResponse
      file: ./src/mapping.ts
