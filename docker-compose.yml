# Prerequisites: copy `backend/.env.example` → `backend/.env` and
# `facilitator/.env.example` → `facilitator/.env`.
# When using the bundled MongoDB service, set in `backend/.env`:
#   MONGODB_URI=mongodb://mongo:27017/beam
# If you use Atlas (or any other remote URI) instead, you can delete the `mongo`
# service, remove `mongo` from `backend.depends_on`, and drop the `mongo_data` volume.

services:
  facilitator:
    build:
      context: ./facilitator
    env_file:
      - ./facilitator/.env
    environment:
      - PORT=3402
    restart: unless-stopped
    ports:
      - "3402:3402"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3402/verify',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    depends_on:
      facilitator:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - X402_FACILITATOR_URL=http://facilitator:3402
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    ports:
      - "3000:3000"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  redis_data:
  mongo_data:
