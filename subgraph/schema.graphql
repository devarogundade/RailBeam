type Merchant @entity(immutable: false) {
  id: Bytes!
  merchant: Bytes! # address
  metadata_schemaVersion: Int! # uint8
  metadata_value: String! # string
  wallet: Bytes! # address
  tokens: [Bytes!]! # address[]
  hook: Bytes! # address
  signers: [Bytes!]! # address[]
  minSigners: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Transaction @entity(immutable: false) {
  id: Bytes!
  transactionId: Bytes! # bytes32
  payer: Bytes! # address
  recipient: Bytes # address
  payers: [Bytes!] # address[]
  signers: [Bytes!]! # address[]
  fulfilleds: [Bytes!]! # address[]
  merchant: Bytes! # address
  token: Bytes! # address
  amounts: [BigInt!] # uint256[]
  adjustedToken: Bytes! # address
  adjustedAmount: BigInt! # uint256
  dueDate: BigInt # uint256
  amount: BigInt # uint256
  timestamp: BigInt # uint256
  description: String # string
  metadata_schemaVersion: Int! # uint8
  metadata_value: String! # string
  status: Int # uint8
  executed: Boolean # bool
  type: Int! # uint8
  subscriptionId: Bytes
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  confirmations: [Confirmation!]! @derivedFrom(field: "transaction")
}

type Confirmation @entity(immutable: true) {
  id: Bytes!
  transactionId: Bytes! # bytes32
  from: Bytes # address
  recipient: Bytes # address
  token: Bytes # address
  amount: BigInt # uint256
  adjustedToken: Bytes # address
  adjustedAmount: BigInt # uint256
  description: String # string
  type: Int! # uint8
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  transaction: Transaction!
}

type SubscriptionPlan @entity(immutable: false) {
  id: Bytes!
  subsciptionId: Bytes!
  merchant: Bytes! # address
  token: Bytes! # address
  interval: BigInt! # uint256
  amount: BigInt! # uint256
  gracePeriod: BigInt! # uint256
  description: String! # string
  catalog_metadata_schemaVersion: Int!
  catalog_metadata_value: String!
  trashed: Boolean!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Agent @entity(immutable: false) {
  id: Bytes!
  agentId: BigInt!
  owner: Bytes! # address
  uri: String
  agentWallet: Bytes # address (decoded from reserved metadata when possible)
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  metadata: [AgentMetadata!]! @derivedFrom(field: "agent")
}

type AgentMetadata @entity(immutable: false) {
  id: Bytes!
  agent: Agent!
  agentId: BigInt!
  key: String!
  value: Bytes!
  updatedBy: Bytes! # address (tx.from for set/transfer-triggered clear)
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Feedback @entity(immutable: false) {
  id: Bytes!
  agentId: BigInt!
  clientAddress: Bytes! # address
  feedbackIndex: BigInt!
  value: BigInt! # int128 stored as BigInt
  valueDecimals: Int!
  tag1: String!
  tag2: String!
  endpoint: String!
  feedbackURI: String!
  feedbackHash: Bytes! # bytes32
  revoked: Boolean!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  responses: [FeedbackResponse!]! @derivedFrom(field: "feedback")
}

type FeedbackResponse @entity(immutable: true) {
  id: Bytes!
  feedback: Feedback!
  agentId: BigInt!
  clientAddress: Bytes! # address
  feedbackIndex: BigInt!
  responder: Bytes! # address
  responseURI: String!
  responseHash: Bytes! # bytes32
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Validation @entity(immutable: false) {
  id: Bytes! # requestHash (bytes32)
  requestHash: Bytes!
  validatorAddress: Bytes! # address
  agentId: BigInt!
  requestURI: String!
  response: Int
  responseURI: String
  responseHash: Bytes
  tag: String
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
